name: Feature Request
description: Propose a new feature, extractor, or enhancement
title: "[FEAT] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a new feature!
        If you want to discuss this idea first, please open a [Discussion](https://github.com/vit0-9/transcriptd/discussions) instead.
  - type: textarea
    id: problem
    attributes:
      label: The problem you're trying to solve
      description: Is your feature request related to a problem? Ex. I'm always frustrated when [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: A clear and concise description of any alternative solutions or features you've considered.
  - type: checkboxes
    id: pr
    attributes:
      label: Would you be willing to submit a PR?
      options:
        - Yes, I can help build this!
    validations:
      required: false